schema = "doctrine.backlog"
version = 1

id = {{id}}
slug = {{slug}}
title = {{title}}
kind = "{{kind}}"
status = "open"
resolution = ""                 # seeded empty so `backlog edit` sets it in place
created = "{{date}}"
updated = "{{date}}"
tags = []

# outbound-only (ADR-004). Cross-kind structural edges (e.g. references with a role
# — `originates_from` for backlog→slice provenance — governed_by, related, drift) are
# uniform `[[relation]]` rows (SL-048 "the cut") — author them with
# `doctrine link ITEM-NNN <label> <target>`; `doctrine inspect ITEM-NNN` renders
# them. The dep/seq axes below stay typed (they carry per-edge payloads).
[relationships]
needs    = []                   # item→item hard prerequisite
after    = []                   # item→item soft sequence: { to, rank? }
triggers = []                   # watched source globs: { globs, note? }
