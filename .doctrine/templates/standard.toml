schema = "doctrine.standard"
version = 1

id = {{id}}
slug = {{slug}}
title = {{title}}
status = "draft"
created = "{{date}}"
updated = "{{date}}"
tags = []

[relationships]
# `supersedes` stays typed — author with `doctrine supersede STD-NNN <previous>`.
# `related` edges are uniform `[[relation]]` rows — author with `doctrine link STD-NNN related <target>`.
supersedes    = []
superseded_by = []   # reverse link is derived
