schema = "doctrine.adr"
version = 1

id = {{id}}
slug = {{slug}}
title = {{title}}
status = "proposed"
created = "{{date}}"
updated = "{{date}}"
tags = []

[relationships]
# `supersedes` stays typed — author with `doctrine supersede ADR-NNN <previous>`.
# `related` edges are uniform `[[relation]]` rows — author with `doctrine link ADR-NNN related <target>`.
supersedes    = []
superseded_by = []   # set on the old ADR by F1; reverse link is derived
