schema = "doctrine.knowledge"
version = 1

id = {{id}}
slug = {{slug}}
title = {{title}}
record_kind = "question"
status = "open"
created = "{{date}}"
updated = "{{date}}"
tags = []

[facet]                         # every field typed; seeded empty (captured later)
question    = ""
why_matters = ""
answer      = ""
answered_by = ""
answered_on = ""

[evidence]                      # free-text citations (supports / contradicts / notes)
supports    = []
contradicts = []
notes       = []

[relationships]                 # verb-written edges (set by doctrine supersede)
supersedes    = []   # record ids this one replaces (set by doctrine supersede)
superseded_by = []   # set on superseded predecessor (verb-written, ADR-004 §5)
